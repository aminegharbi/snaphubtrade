events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Upstreams ──────────────────────────────────────────────────────────────

  upstream web_upstream {
    server web:3000;
    keepalive 16;
  }

  upstream api_upstream {
    server api:3001 max_fails=10 fail_timeout=30s;
    keepalive 32;
  }

  # ── Logging ────────────────────────────────────────────────────────────────

  log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;   # only WARN+ not connection refused noise

  # ── Global settings ────────────────────────────────────────────────────────

  sendfile        on;
  tcp_nopush      on;
  gzip            on;
  gzip_types      text/plain application/json application/javascript text/css;

  # ── Server ─────────────────────────────────────────────────────────────────

  # ── Marketing automation (separate docker-compose project) ────────────────
  # Routes marketing.dubaiauto.ae to the marketing-automation stack's Caddy
  # container, which listens on host port 8080/8443 (not 80/443, to avoid
  # clashing with this same nginx). This is what lets Let's Encrypt's HTTP-01
  # challenge succeed on the STANDARD port 80 as seen from the internet, even
  # though Caddy itself is bound to an alternate host port behind the scenes.
  #
  # ⚠️ EDIT "marketing.dubaiauto.ae" below to match the real N8N_HOST value
  # set in marketing-automation/.env — nginx can't read that .env file itself
  # (separate docker-compose project), so this must be kept in sync manually.
  server {
    listen 80;
    server_name marketing.dubaiauto.ae;

    location / {
      proxy_pass             http://host.docker.internal:8080;
      proxy_http_version     1.1;
      proxy_set_header       Host              $host;
      proxy_set_header       X-Real-IP         $remote_addr;
      proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header       X-Forwarded-Proto $scheme;
      # n8n uses WebSockets for the editor UI (live execution updates) —
      # without this upgrade, the workflow editor loads but shows stale state.
      proxy_set_header       Upgrade           $http_upgrade;
      proxy_set_header       Connection        "upgrade";
    }
  }

  server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 50M;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # ── API — proxy to NestJS ─────────────────────────────────────────────

    location /api/ {
      proxy_pass             http://api_upstream;
      proxy_http_version     1.1;
      proxy_set_header       Host              $host;
      proxy_set_header       X-Real-IP         $remote_addr;
      proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header       X-Forwarded-Proto $scheme;
      proxy_set_header       Connection        "";

      proxy_connect_timeout  5s;
      proxy_read_timeout     120s;
      proxy_send_timeout     30s;

      # Return 503 with JSON when API not yet started (instead of connection refused 502)
      proxy_intercept_errors on;
      error_page 502 503 504 = @api_unavailable;

      # CORS preflight
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin  "*";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, Accept";
        add_header Content-Length 0;
        return 204;
      }
    }

    location @api_unavailable {
      default_type application/json;
      add_header Retry-After 10 always;
      return 503 '{"error":"API starting","message":"The API is initializing. Please retry in a few seconds.","retry_after":10}';
    }

    # ── WebSocket / Socket.io ─────────────────────────────────────────────

    location /socket.io/ {
      proxy_pass         http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
    }

    # ── Static uploads served by API ──────────────────────────────────────

    location /static/ {
      proxy_pass    http://api_upstream;
      add_header    Cache-Control "public, max-age=604800";
      proxy_intercept_errors on;
      error_page 502 503 504 = @static_unavailable;
    }

    location @static_unavailable {
      return 404;
    }

    # ── Next.js frontend ──────────────────────────────────────────────────

    location / {
      proxy_pass         http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_connect_timeout 10s;
      proxy_read_timeout    60s;
    }
  }
}
